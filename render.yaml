services:
  # ── Flask API ──────────────────────────────────────────────
  - type: web
    name: joblib-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn flask_app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: joblib-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Streamlit Frontend ─────────────────────────────────────
  - type: web
    name: joblib-frontend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: joblib-db
          property: connectionString
      - key: FLASK_API_URL
        fromService:
          name: joblib-api
          type: web
          property: host
          envVarKey: FLASK_API_URL
      - key: TWILIO_ACCOUNT_SID
        sync: false        # fill manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: joblib-db
    databaseName: placement_db_student
    user: postgres
    plan: free
